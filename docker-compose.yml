version: '3.8'

services:
  codex-manager:
    build: .
    container_name: codex-manager
    ports:
      - "8096:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      # Web UI 配置（也可在 .env 文件中设置）
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_ACCESS_PASSWORD=${APP_ACCESS_PASSWORD:-admin123}
      - APP_UPDATE_REPOSITORY=${APP_UPDATE_REPOSITORY:-moeacgx/codex-manager}
      - APP_DATA_DIR=/app/data
      - APP_LOGS_DIR=/app/logs
      # 有头浏览器 (Playwright) 在无桌面服务器上使用 Xvfb
      - ENABLE_XVFB=1
      # 有头浏览器减速配置（模拟人工操作）
      # 延迟倍率：整体放大每步随机等待
      - BROWSER_DELAY_MULTIPLIER=2.5
      # 超时倍率：整体放大等待/点击超时
      - BROWSER_TIMEOUT_MULTIPLIER=2.0
      # 单步最小等待（秒）
      - BROWSER_DELAY_MIN=1.2
      # 单步最大等待（秒）
      - BROWSER_DELAY_MAX=4.0
      # 自动刷新：0 关闭（避免误判“卡住”）
      - BROWSER_AUTO_REFRESH=0
      # 数据库（默认 SQLite，如需 PostgreSQL 取消下方注释）
      # - APP_DATABASE_URL=postgresql://user:password@db:5432/codex
      # HTTP 代理（如需代理取消下方注释）
      # - HTTP_PROXY=http://your-proxy:port
      # - HTTPS_PROXY=http://your-proxy:port
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
