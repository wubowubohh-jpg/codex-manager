version: '3.8'

services:
  codex-manager:
    build: .
    container_name: codex-manager
    ports:
      - "8096:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Asia/Shanghai}
      # 0=仅写文件日志，不输出到 Docker 控制台；1=同时输出控制台
      - APP_LOG_TO_STDOUT=${APP_LOG_TO_STDOUT:-0}
      # 数据库连接池（并发任务高时建议适当调大）
      - APP_DB_POOL_SIZE=${APP_DB_POOL_SIZE:-20}
      - APP_DB_MAX_OVERFLOW=${APP_DB_MAX_OVERFLOW:-40}
      - APP_DB_POOL_TIMEOUT=${APP_DB_POOL_TIMEOUT:-5}
      - APP_DB_POOL_RECYCLE=${APP_DB_POOL_RECYCLE:-1800}
      # Web UI 配置（也可在 .env 文件中设置）
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_ACCESS_PASSWORD=${APP_ACCESS_PASSWORD:-admin123}
      - APP_UPDATE_REPOSITORY=${APP_UPDATE_REPOSITORY:-moeacgx/codex-manager}
      - APP_DATA_DIR=/app/data
      - APP_LOGS_DIR=/app/logs
      # 数据库（默认 SQLite，如需 PostgreSQL 取消下方注释）
      # - APP_DATABASE_URL=postgresql://user:password@db:5432/codex
      # HTTP 代理（如需代理取消下方注释）
      # - HTTP_PROXY=http://your-proxy:port
      # - HTTPS_PROXY=http://your-proxy:port
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
